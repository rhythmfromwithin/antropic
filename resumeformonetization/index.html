<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.65;
      color: #1c1917;
      background: #fafaf9;
    }
    .wrap {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    .md { background: #fff; border: 1px solid #e7e5e4; border-radius: 12px; padding: 2rem 2.25rem; }
    .md :first-child { margin-top: 0; }
    .md h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.75rem; }
    .md h2 { font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #78716c; margin: 2rem 0 0.75rem; padding-top: 0.5rem; border-top: 1px solid #e7e5e4; }
    .md h2:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
    .md h3 { font-size: 1.0625rem; font-weight: 600; margin: 1.25rem 0 0.25rem; }
    .md p { margin: 0.5rem 0; color: #44403c; }
    .md ul { margin: 0.5rem 0 0.75rem; padding-left: 1.25rem; color: #44403c; }
    .md li { margin: 0.35rem 0; }
    .md hr { border: 0; border-top: 1px solid #e7e5e4; margin: 1.5rem 0; }
    .md a { color: #b45309; }
    .md strong { color: #1c1917; font-weight: 600; }
    .md em { font-style: italic; }
    .err { color: #b91c1c; padding: 1rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="root" class="md" role="article">Loading…</div>
  </div>
  <script>
    (function () {
      var root = document.getElementById('root');
      fetch('resume_anthropic.md', { cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) throw new Error(r.status);
          return r.text();
        })
        .then(function (text) {
          root.innerHTML = marked.parse(text);
          var h1 = root.querySelector('h1');
          if (h1 && h1.textContent) document.title = h1.textContent.trim();
        })
        .catch(function () {
          root.className = 'md err';
          root.textContent = 'Could not load resume_anthropic.md.';
        });
    })();
  </script>
</body>
</html>
